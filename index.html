    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                '50': '#eff6ff',
                '100': '#dbeafe',
                '200': '#bfdbfe',
                '300': '#93c5fd',
                '400': '#60a5fa',
                '500': '#3b82f6',

            }
          }
        }

    <style>
      @media print {
        .no-print {
          display: none !important;
        }
        /* Reset layout constraints for printing */
        body, #root, .flex, .h-screen, .overflow-hidden, .overflow-y-auto, .overflow-x-hidden {
          height: auto !important;
          overflow: visible !important;
          position: static !important;
          display: block !important;
        }
        
        /* Ensure the main content area expands */
        main {
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
        }

        /* Hide sidebar and header explicitly if logic fails */
        aside, header {
          display: none !important;
        }

        .print-area {
          box-shadow: none !important;
          border: none !important;
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
          background-color: white !important;
          color: black !important;
        }
        .page-break {
          page-break-after: always;
        }
      }
    </style>
